<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<main class="registration">
    <div class="logo">
        <img src="images/homeWorks.png" alt="homeworks">
    </div>
    <div class="page">
        <div class="registration__info">
            <div class="info__title">
                <h3 class="head" id="text">Get your free account</h3>
                <p class="text">Try homeWorks BUSINESS free for 15 days. Downgrade to Basic (Free Forever) anytime.</p>
            </div>
            <form action="#" method="post" class="info__form" id="registration-form">
                <label class="label" id="full">Full Name
                    <input type="text" class="input" name="Name" id="FullName">
                    <span class="error">Заполните поле Full Name!</span>
                </label>
                <label class="label" id="USER">Your Username
                    <input type="text" class="input" name="Username" id="Username">
                    <span class="error">Заполните поле Your Username!</span>
                </label>
                <label class="label" id="mail">E-mail
                    <input type="email" class="input" name="Email" id="Email">
                    <span class="error">Заполните поле Email!</span>
                </label>
                <label class="label" id="PASSW">Password
                    <input type="password" class="input" name="Password" id="Password">
                    <span class="error">Заполните поле Password!</span>
                </label>
                <label class="label" id="pass">Repeat Password
                    <input type="password" class="input" name="Repeat Password" id="RepeatPassword">
                    <span class="error">Заполните поле Repeat Password!</span>
                </label>
                <label class="info__checkbox" id="check">
                    <input type="checkbox" name="Agree" id="checkbox">Agree to our Terms of Service and Privacy
                    Statement
                </label>
                <input type="button" value="Sign Up" id="btn" class="info__btn btn">
                <a href="#" class="info__account" id="account">Already have an account?</a>
            </form>
        </div>
        <div class="registration__image">
            <img src="images/image.png" alt="image" class="image__img">
        </div>
    </div>
    <div class="popup">
        <div class="popup__content">На вашу почту выслана ссылка, перейдите по ней, чтобы завершить регистрацию</div>
        <div class="popup__close">
            <button type="button" class="popup__button" id="popbtn" >Ok</button>
        </div>
    </div>
</main>

<script src="scripts/jquery-3.7.1.js"></script>
<script src="scripts/script.js"></script>
</body>
</html>
